data:
  train_path: data/processed/ml-1m/train.csv
  valid_path: data/processed/ml-1m/valid.csv
  test_path: data/processed/ml-1m/test.csv

model:
  embedding_dim: 32
  num_layers: 2
  semantic_input_dim: 16
  semantic_dim: 32
  semantic_dropout: 0.0
  semantic_use_mlp: false
  semantic_normalize: true
  gate_type: vector
  control_scale: 0.0
  dropout: 0.0

train:
  lr: 0.001
  weight_decay: 0.0
  batch_size: 4
  epochs: 3
  num_workers: 0
  shuffle: true
  grad_clip_norm: 5.0
  lambda_align: 0.1
  lambda_reg: 0.0001
  align_type: cosine
  pin_memory: false
  drop_last: false
  save_every_epoch: false

seed: 42

output:
  save_dir: checkpoints