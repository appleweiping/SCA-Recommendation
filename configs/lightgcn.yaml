seed: 2024

data:
  train_path: data/processed/ml1m/train.csv
  valid_path: data/processed/ml1m/valid.csv
  test_path: data/processed/ml1m/test.csv

model:
  name: lightgcn
  embedding_dim: 64
  num_layers: 3

train:
  lr: 0.001
  batch_size: 1024
  epochs: 2
  lambda_reg: 1.0e-4
  num_workers: 0
  shuffle: true
  pin_memory: true
  drop_last: false

output:
  save_dir: outputs/lightgcn_smoke